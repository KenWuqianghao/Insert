name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: make dmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Insert-Installer.dmg
          generate_release_notes: true
